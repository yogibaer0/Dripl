<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>AMEBA</title>

  <!-- ===== Config (injected by server.ts) ===== -->
  <meta name="supabase-url" content="{{SUPABASE_URL}}">
  <meta name="supabase-anon-key" content="{{SUPABASE_ANON_KEY}}">
  <meta name="api-base" content="{{API_BASE}}">
  <meta name="page-nonce" content="{{NONCE}}">

  <!-- ===== Styles ===== -->
  <link rel="stylesheet" href="/styles.css" />
  <link rel="stylesheet" href="/workshop.css" />
  <link rel="stylesheet" href="/campaign.css" />
  <link rel="stylesheet" href="/supply.css" />

  <!-- ===== Security: local UMD + CSP nonce ===== -->
  <script {{SUPABASE_SRI_ATTR}} src="/vendor/supabase.min.js" nonce="{{NONCE}}"></script>

  <!-- Bootstrap config for JS -->
  <script nonce="{{NONCE}}">
    (function () {
      const meta = (n) => document.querySelector(`meta[name="${n}"]`)?.content?.trim() || "";
      window.__APP__ = {
        NONCE: meta("page-nonce"),
        API_BASE: meta("api-base") || "",
        SUPABASE_URL: meta("supabase-url"),
        SUPABASE_ANON_KEY: meta("supabase-anon-key")
      };
    }());
  </script>
</head>

<body>

<!-- ===== NEW AMEBA WORKSHOP SHELL ===== -->
<div class="ameba-shell" id="amebaShell">

  <!-- LEFT NAV -->
  <nav class="ameba-nav" id="amebaNav" aria-label="Primary navigation">
    <div class="ameba-nav__brand">
      <svg viewBox="0 0 28 28" class="ameba-nav__logo" aria-hidden="true">
        <ellipse cx="14" cy="13" rx="9" ry="10" fill="none" stroke="#a78bfa" stroke-width="2"/>
        <ellipse cx="18" cy="9" rx="4" ry="4.5" fill="none" stroke="#a78bfa" stroke-width="1.5" opacity="0.5"/>
        <ellipse cx="9" cy="18" rx="3.5" ry="4" fill="none" stroke="#a78bfa" stroke-width="1.5" opacity="0.5"/>
      </svg>
      <span class="ameba-nav__wordmark">ameba</span>
    </div>
    <ul class="ameba-nav__list" role="list">
      <li>
        <button class="ameba-nav__item is-active" data-page="workshop" aria-current="page">
          <svg viewBox="0 0 20 20" class="ameba-nav__icon" aria-hidden="true">
            <rect x="2" y="2" width="7" height="7" rx="2" fill="currentColor" opacity="0.8"/>
            <rect x="11" y="2" width="7" height="7" rx="2" fill="currentColor" opacity="0.4"/>
            <rect x="2" y="11" width="7" height="7" rx="2" fill="currentColor" opacity="0.4"/>
            <rect x="11" y="11" width="7" height="7" rx="2" fill="currentColor" opacity="0.4"/>
          </svg>
          <span class="ameba-nav__label">Workshop</span>
        </button>
      </li>
      <li>
        <button class="ameba-nav__item" data-page="campaign">
          <svg viewBox="0 0 20 20" class="ameba-nav__icon" aria-hidden="true">
            <path d="M3 10 L10 3 L17 10 L17 18 H3 Z" fill="none" stroke="currentColor" stroke-width="1.5" stroke-linejoin="round"/>
            <rect x="7" y="13" width="6" height="5" rx="1" fill="currentColor" opacity="0.6"/>
          </svg>
          <span class="ameba-nav__label">Campaign</span>
        </button>
      </li>
      <li>
        <button class="ameba-nav__item" data-page="supply">
          <svg viewBox="0 0 20 20" class="ameba-nav__icon" aria-hidden="true">
            <rect x="2" y="5" width="16" height="12" rx="2" fill="none" stroke="currentColor" stroke-width="1.5"/>
            <path d="M6 5 V3 a4 4 0 0 1 8 0 V5" fill="none" stroke="currentColor" stroke-width="1.5" stroke-linecap="round"/>
            <circle cx="10" cy="11" r="2" fill="currentColor" opacity="0.7"/>
          </svg>
          <span class="ameba-nav__label">Supply</span>
        </button>
      </li>
    </ul>
    <div class="ameba-nav__footer">
      <button class="ameba-nav__avatar" id="amebaNavAvatar" aria-label="Account">
        <svg viewBox="0 0 20 20" aria-hidden="true">
          <circle cx="10" cy="7" r="4" fill="currentColor" opacity="0.8"/>
          <path d="M3 18c0-3.9 3.1-7 7-7s7 3.1 7 7" fill="currentColor" opacity="0.5"/>
        </svg>
      </button>
    </div>
  </nav>

  <!-- CENTER WORKSPACE -->
  <main class="ameba-workspace" id="amebaWorkspace" aria-label="Main workspace">
    <!-- Workshop Page (default) -->
    <div class="page-view page-view--workshop is-active" id="pageWorkshop" data-view="workshop">
      <!-- injected by JS -->
    </div>
    <!-- Campaign Page (placeholder) -->
    <div class="page-view page-view--campaign" id="pageCampaign" data-view="campaign" hidden>
      <!-- injected by JS -->
    </div>
    <!-- Supply Page (placeholder) -->
    <div class="page-view page-view--supply" id="pageSupply" data-view="supply" hidden>
      <!-- injected by JS -->
    </div>
  </main>

  <!-- RIGHT: AMEBA RAIL -->
  <aside class="ameba-rail" id="amebaRail" aria-label="Ameba context rail">
    <!-- injected by JS -->
  </aside>

</div>
<!-- ===== END AMEBA WORKSHOP SHELL ===== -->


  <!-- Hidden input for local picker (must not be display:none) -->
  <label for="fileInput" class="sr-only">Choose a file</label>
  <input id="fileInput" type="file" accept="video/*,image/*" aria-hidden="true" />

  <script src="/workshop.js" nonce="{{NONCE}}"></script>
  <script src="/campaign.js" nonce="{{NONCE}}"></script>
  <script src="/supply.js" nonce="{{NONCE}}"></script>
</body>
</html>
